name: Crear APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Localizar proyecto Android
        id: android_project
        shell: bash
        run: |
          set -euo pipefail
          echo "Archivos principales del repositorio:"
          find . -maxdepth 4 -type f | sort | sed 's#^./##'

          SETTINGS_FILE="$(find . -type f \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) | head -n 1 || true)"
          if [ -z "$SETTINGS_FILE" ]; then
            echo "::error::No se encontró settings.gradle ni settings.gradle.kts. Sube el proyecto Android completo."
            exit 1
          fi

          ANDROID_DIR="$(dirname "$SETTINGS_FILE")"
          echo "Proyecto Android encontrado en: $ANDROID_DIR"
          echo "dir=$ANDROID_DIR" >> "$GITHUB_OUTPUT"

      - name: Preparar Android SDK
        shell: bash
        run: |
          set -euo pipefail

          export ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/build-tools/35.0.0" >> "$GITHUB_PATH"

          SDKMANAGER="$(find "$ANDROID_HOME" -type f -name sdkmanager 2>/dev/null | sort -V | tail -n 1 || true)"

          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager no encontrado. Instalando Android command line tools..."
            mkdir -p "$ANDROID_HOME/cmdline-tools"
            curl -L --retry 3 -o /tmp/android_cmdline_tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            rm -rf /tmp/android_cmdline_tools
            mkdir -p /tmp/android_cmdline_tools
            unzip -q /tmp/android_cmdline_tools.zip -d /tmp/android_cmdline_tools
            rm -rf "$ANDROID_HOME/cmdline-tools/latest"
            mv /tmp/android_cmdline_tools/cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"
            SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          fi

          if [ ! -x "$SDKMANAGER" ]; then
            echo "::error::No se pudo preparar sdkmanager."
            find "$ANDROID_HOME" -maxdepth 5 -type f | sort || true
            exit 1
          fi

          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Instalar Gradle 8.10.2
        shell: bash
        run: |
          set -euo pipefail
          curl -L --retry 3 https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d "$HOME/gradle"
          echo "$HOME/gradle/gradle-8.10.2/bin" >> "$GITHUB_PATH"

      - name: Comprobar herramientas
        shell: bash
        run: |
          set -euo pipefail
          java -version
          gradle --version
          echo "ANDROID_HOME=$ANDROID_HOME"
          find "$ANDROID_HOME" -type f -name sdkmanager | sort || true

      - name: Compilar APK Debug
        working-directory: ${{ steps.android_project.outputs.dir }}
        shell: bash
        run: |
          set -euo pipefail
          gradle assembleDebug --no-daemon --stacktrace

      - name: Localizar APK generada
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          ANDROID_DIR="${{ steps.android_project.outputs.dir }}"
          APK_FILE="$(find "$ANDROID_DIR" -type f -path '*/build/outputs/apk/*/*.apk' | head -n 1 || true)"
          if [ -z "$APK_FILE" ]; then
            APK_FILE="$(find "$ANDROID_DIR" -type f -name '*.apk' | head -n 1 || true)"
          fi
          if [ -z "$APK_FILE" ]; then
            echo "::error::La compilación terminó, pero no se encontró ningún .apk."
            find "$ANDROID_DIR" -maxdepth 8 -type f | sort || true
            exit 1
          fi
          echo "APK encontrada: $APK_FILE"
          echo "file=$APK_FILE" >> "$GITHUB_OUTPUT"

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Control-ESP32-S3-V4-debug-apk
          path: ${{ steps.apk.outputs.file }}
